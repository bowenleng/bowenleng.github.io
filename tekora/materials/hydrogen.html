        // Fetch the external Markdown file
        fetch('https://github.com/bowenleng/Tekora-docs/blob/main/materials/HYDROGEN.md')

            .then(markdownText => {
                // Convert Markdown text to HTML and insert it into the DOM
                document.getElementById('content').innerHTML = marked.parse(markdownText);

            .catch(error => {
                document.getElementById('content').innerHTML =
                'This page currently does not exist. You may create the contents for this page at <a href="https://github.com/bowenleng/Tekora-docs/blob/main/materials">this link</a> with the name HYDROGEN.md';
